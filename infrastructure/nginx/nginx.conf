events {
    worker_connections 1024;
}

http {
    # --------------------------------------------------------
    # PRODUCTION CONCERN: Rate Limiting
    # Allocates 10MB of memory to track IPs (~160,000 IPs)
    # Limits requests to 5 per second per IP
    # --------------------------------------------------------
    # Add Security and Compression
    server_tokens off; # Hides the Nginx version from attackers
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 1000; # Only compress payloads larger than 1KB

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # --------------------------------------------------------
        # 1. Route API requests to FastAPI
        # --------------------------------------------------------
        location /api/ {
            # Apply the rate limit: allow bursts of 10, but process immediately
            limit_req zone=api_limit burst=10 nodelay;

            # Removed trailing slash so /api/v1/ is successfully passed to FastAPI
            proxy_pass http://api:8000/;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # PRODUCTION CONCERN: Limit file sizes to 500MB
            client_max_body_size 500M;
        }

        # --------------------------------------------------------
        # 2. Route everything else to the React Frontend
        # --------------------------------------------------------
        location / {
            # Updated to 8080 to match the secure, unprivileged Nginx image
            proxy_pass http://frontend:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support WebSockets (needed for Vite hot-reloading)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
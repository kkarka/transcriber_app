apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: api:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-config
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    initContainers:
      - name: init-db
        image: api:local
        command: ['python', '-c', 'from database import engine; from models import Base; import time; [Base.metadata.create_all(bind=engine) or print("DB Ready") if i==4 else time.sleep(2) for i in range(5)]']
        envFrom:
        - configMapRef:
            name: app-config
    containers:
      - name: api
        image: api:local
    app: api
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: worker:local
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args: ["rq worker transcriptions --url redis://redis:6379 --path /app"]
        envFrom:
        - configMapRef:
            name: app-config
        volumeMounts:
        - name: uploads-storage
          mountPath: /app/uploads
      volumes:
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: uploads-pvc
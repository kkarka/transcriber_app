apiVersion: v1
kind: ConfigMap
metadata:
  name: transcriber-dashboard
  namespace: monitoring 
  labels:
    grafana_dashboard: "1" 
data:
  transcriber.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Track the worker deployment scaling",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "drawStyle": "line",
                "fillOpacity": 20,
                "lineInterpolation": "stepBefore",
                "lineWidth": 1,
                "showPoints": "auto"
              },
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "id": 3,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "kube_deployment_status_replicas{deployment=\"worker\", namespace=\"default\"}",
              "legendFormat": "Active Workers",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Active AI Workers (KEDA)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 9 },
          "id": 2,
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, handler) (rate(http_request_duration_seconds_bucket{handler!=\"/metrics\"}[5m])))",
              "legendFormat": "{{handler}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "P95 Latency",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 9 },
          "id": 1,
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (handler) (rate(http_requests_total{handler!=\"/metrics\"}[5m]))",
              "legendFormat": "{{handler}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "API Traffic (RPS)",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "time": { "from": "now-15m", "to": "now" },
      "timezone": "browser",
      "title": "Transcriber App Dashboard",
      "uid": "transcriber-v1",
      "version": 1
    }
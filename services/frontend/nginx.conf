server {
    # Listen on 8080 to match the unprivileged image requirements
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # CRITICAL FOR REACT: If a file isn't found, fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    # A simple healthcheck endpoint for Docker/Kubernetes
    location /health {
        access_log off;
        return 200 'healthy\n';
    }
}